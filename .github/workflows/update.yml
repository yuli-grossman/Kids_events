name: Update Events Daily

on:
  schedule:
    # 05:00 UTC = 08:00 Israel time (winter) / 08:00 = 06:00 UTC (summer, UTC+3)
    - cron: '0 5 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated index.html
        run: |
          git config user.name  "Events Bot"
          git config user.email "events-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update events $(date +%Y-%m-%d)"
          git push
